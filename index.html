<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bootleg cinema</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #ffffff;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 680px;
        width: 100%;
      }
      .logo {
        width: 100%;
        max-width: 520px;
        height: auto;
        display: block;
        margin-bottom: -10px;
      }
      .taglines {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .taglines p {
        font-family: "Times New Roman", Times, serif;
        font-size: clamp(14px, 2.2vw, 18px);
        color: #111111;
        line-height: 1.6;
        letter-spacing: 0.01em;
      }
      .info-btn {
        margin-top: 48px;
        background: none;
        border: none;
        font-family: "Times New Roman", Times, serif;
        font-size: clamp(14px, 2.2vw, 18px);
        color: #111111;
        cursor: pointer;
        letter-spacing: 0.01em;
        text-decoration: underline;
        text-underline-offset: 3px;
        padding: 0;
      }
      .info-btn:hover {
        color: #555555;
      }
      @media (max-width: 480px) {
        .logo {
          max-width: 90vw;
        }
        .taglines p,
        .info-btn {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="logo" src="bootleg_cinema_logo.png" />
      <div class="taglines">
        <p><em>Funeral Parade of Roses</em> (1969)</p>
        <p>Directed by Toshio Matsumoto</p>
        <p>Monday 01.06.2026 - 9:45PM</p>
        <p>Philips de Jongh park area</p>
      </div>
      <button class="info-btn" onclick="window.location.href = 'info.html'">
        info
      </button>
    </div>
  </body>
</html>
